services:
  - type: web
    name: ai-job-matcher-backend
    env: docker
    rootDir: backend
    plan: free # Change to starter or standard if you want more RAM/speed
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false # Set this in the Render Dashboard securely
      - key: PINECONE_API_KEY
        sync: false # Set this in the Render Dashboard securely
      - key: PINECONE_ENV
        sync: false
      - key: PINECONE_INDEX
        sync: false
      - key: USE_MOCK_PINECONE
        value: "false"
