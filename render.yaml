services:
  - type: web
    name: ai-job-matcher-backend
    env: docker
    rootDir: backend
    plan: free # Change to starter or standard if you want more RAM/speed
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false # Set this in the Render Dashboard securely
      - key: PINECONE_API_KEY
        sync: false # Set this in the Render Dashboard securely
      - key: PINECONE_ENV
        sync: false
      - key: PINECONE_INDEX
        sync: false
      - key: USE_MOCK_PINECONE
        value: "false"

  - type: web
    name: ai-job-matcher-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-job-matcher-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
